name: financeiro
description: Premium personal finance management app — local-first, offline-ready.
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^13.2.0

  # Code generation
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

  # Network
  dio: ^5.4.3
  connectivity_plus: ^6.0.3

  # Local storage
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  path_provider: ^2.1.3
  flutter_secure_storage: ^9.0.0

  # Auth
  local_auth: ^2.2.0

  # Charts
  fl_chart: ^0.68.0

  # UI & Design
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  responsive_framework: ^1.3.2
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.10+1
  gap: ^3.0.1
  lottie: ^3.1.0

  # Internationalization
  intl: ^0.19.0

  # Notifications
  flutter_local_notifications: ^17.1.2
  timezone: ^0.9.4

  # SharedPreferences
  shared_preferences: ^2.2.3

  # Utils
  uuid: ^4.4.0
  equatable: ^2.0.5
  dartz: ^0.10.1
  collection: ^1.18.0
  rxdart: ^0.27.7
  logger: ^2.3.0
  package_info_plus: ^8.0.0
  device_info_plus: ^10.1.0
  share_plus: ^9.0.0
  file_picker: ^8.0.3
  image_picker: ^1.1.2
  pdf: ^3.11.1
  printing: ^5.13.1
  csv: ^6.0.0
  permission_handler: ^11.3.1
  url_launcher: ^6.3.0
  flutter_haptic_feedback: ^0.4.0
  auto_size_text: ^3.0.0
  percent_indicator: ^4.2.3
  fl_country_code_picker: ^0.1.3+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

  # Code generation
  build_runner: ^2.4.9
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0
  isar_generator: ^3.1.0+1
  custom_lint: ^0.6.4
  riverpod_lint: ^2.3.10

  # Linting
  flutter_lints: ^4.0.0
  mocktail: ^1.0.3

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/fonts/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Thin.ttf
          weight: 100
        - asset: assets/fonts/Inter-ExtraLight.ttf
          weight: 200
        - asset: assets/fonts/Inter-Light.ttf
          weight: 300
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
        - asset: assets/fonts/Inter-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/Inter-Black.ttf
          weight: 900
