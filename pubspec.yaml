name: financeiro
description: Premium personal finance management app — local-first, offline-ready.
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^13.2.0

  # Local storage
  sqflite: ^2.3.3
  path: ^1.9.0
  path_provider: ^2.1.3
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.3

  # Auth
  local_auth: ^2.2.0

  # Charts
  fl_chart: ^0.68.0

  # UI & Design
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  responsive_framework: ^1.3.2
  gap: ^3.0.1
  auto_size_text: ^3.0.0
  percent_indicator: ^4.2.3

  # Internationalization
  intl: ^0.20.0

  # Notifications
  flutter_local_notifications: ^17.1.2
  timezone: ^0.9.4

  # Utils
  uuid: ^4.4.0
  equatable: ^2.0.5
  collection: ^1.18.0
  logger: ^2.3.0
  package_info_plus: ^8.0.0
  device_info_plus: ^10.1.0
  share_plus: ^9.0.0
  file_picker: ^8.0.3
  image_picker: ^1.1.2
  pdf: ^3.11.1
  printing: ^5.13.1
  csv: ^6.0.0
  permission_handler: ^11.3.1
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
